<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Good Heart Foundation{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Good Heart Foundation supports communities through volunteers, events, and fundraising programs.{% endblock %}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/transition.css') }}?v=4">
    <style>
        .card.flash-message {
            margin-bottom: 0.75rem;
            animation: slideDown 0.3s ease forwards;
        }
        .card.flash-message.error {
            background: #fff5f5;
            border-left: 4px solid #c0392b;
            color: #7b2020;
        }
        .card.flash-message.error::before {
            content: "⚠ ";
        }
        .card.flash-message.success {
            background: #f0fff4;
            border-left: 4px solid #27ae60;
            color: #1e5e35;
        }
        .card.flash-message.success::before {
            content: "✓ ";
        }
    </style>
    {% block styles %}{% endblock %}
</head>
<body>
    <div class="site-shell">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <section class="container" style="padding-top: 1rem;">
            {% for category, message in messages %}
            <div class="card flash-message {{ 'error' if category == 'error' else 'success' }}">
                <strong style="display:block; margin-bottom:0.35rem;">{{ category|title }}</strong>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        </section>
        {% endif %}
        {% endwith %}
        {% block body %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/transition.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
